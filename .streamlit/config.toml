[server]
headless = true
# PST files are typically 10–100 MB; 200 MB keeps us within Render free 512 MB RAM
maxUploadSize = 200
maxMessageSize = 200
# Disable WS compression — required to avoid ERR_HTTP2_PROTOCOL_ERROR behind Render's proxy
enableWebsocketCompression = false
# Trust the X-Forwarded-* headers from Render's load balancer
enableCORS = false

[browser]
gatherUsageStats = false
